<!doctype html><html><head>
<meta charset="utf-8"><title>Prediction Market Sim</title>
<style>
body{font-family:sans-serif;max-width:700px;margin:40px auto}
.market{border:1px solid #ccc;padding:15px;margin-bottom:15px;border-radius:6px}
button{padding:8px 16px;margin-right:8px}
input,select{padding:6px}
</style></head><body>
<h1>Prediction Market Simulator</h1>
<div id="markets"></div>
<div id="bots"></div>

<script>
async function loadMarkets(){
  const res=await fetch('/markets');
  const markets=await res.json();
  document.getElementById('markets').innerHTML='';
  markets.forEach(m=>{
    const x=m.outcomes.yes,y=m.outcomes.no,total=x+y;
    const probYes=(x/y).toFixed(3);
    const probNo=(y/x).toFixed(3);
    document.getElementById('markets').innerHTML+=`
    <div class="market">
      <h3>${m.description}</h3>
      <p>YES: ${probYes} | NO: ${probNo}</p>
      <select id="outcome-${m.id}"><option value="yes">YES</option><option value="no">NO</option></select>
      <input type="number" id="qty-${m.id}" placeholder="qty" style="width:60px"/>
      <button onclick="trade('${m.id}')">Buy</button>
    </div>`;
  });
}
async function trade(mid){
  const outcome=document.getElementById('outcome-'+mid).value;
  const qty=parseInt(document.getElementById('qty-'+mid).value);
  await fetch('/trade',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({marketId:mid,outcome,qty,amount:1000})});
  loadMarkets();
}
loadMarkets();setInterval(loadMarkets,5000);
